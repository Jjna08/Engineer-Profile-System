<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Engineer Recruitment System</title>
    <link rel="stylesheet" href="style.css">
    <script src="app.js" defer></script>
</head>

<body>

<header>
    <h1>Engineer Recruitment System</h1>
    <p>Find the best engineer for your company</p>

    <input type="text" id="searchInput" placeholder="Search engineer by name...">
    <button onclick="clearSearch()">Clear</button>
</header>

<main>
    <div id="engineersContainer"></div>
</main>

<footer>
    <p>© 2026 Engineer Recruitment System</p>
</footer>

<!-- Popup -->
<div id="popup" class="popup hidden">
    <div class="popup-content">
        <span id="closePopup">&times;</span>
        <div id="popupDetails"></div>
    </div>
</div>

</body>
</html>
